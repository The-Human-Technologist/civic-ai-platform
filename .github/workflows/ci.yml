name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Install · typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install worker test dependencies
        run: python -m pip install pydantic==2.11.7 pydantic-settings==2.10.1

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Verify footage policy
        run: npm run verify:footage

      - name: Verify Phase 2 foundation
        run: npm run verify:phase2

      - name: Run worker safety tests
        run: npm run test:worker

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://example.com

  browser:
    name: Desktop and mobile browser regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser regression suite
        run: npm run test:e2e
